spring.application.name=cloudpos-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cloudpos
spring.datasource.username=cloudpos_user
spring.datasource.password=cloudpos1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration - Force table creation
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Remove the dialect warning by letting Hibernate choose
# No need to specify dialect explicitly for PostgreSQL

# Server Configuration
server.port=8080

# Logging - Increase log output to see full SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.tool.schema=DEBUG